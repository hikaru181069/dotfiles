# vim: ft=tmux
set -g mode-style "fg=#a6adc8,bg=#181825"

set -g message-style "fg=#a6adc8,bg=#181825"
set -g message-command-style "fg=#a6adc8,bg=#181825"

set -g pane-border-style "fg=#1e1e2e, bg=#1e1e2e"
set -g pane-active-border-style "fg=#313244, bg=#1e1e2e"

set -g status "on"
set -g status-interval 1
set -g status-justify "left"

set -g status-style "fg=#a6adc8,bg=#11111b"

set -g status-bg "#181825"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#{?client_prefix,#11111b,#11111b},bg=#{?client_prefix,#94e2d5,#6c7086},bold] #S #[fg=#{?client_prefix,#bceee6,#7f849c},bg=#{?client_prefix,#9399b2,#9399b2},nobold,nounderscore,noitalics]#[fg=#15161E,bg=#9399b2,bold] #(whoami) #[fg=#a6adc8,bg=#181825]"
set -g status-right "#[fg=#f38ba8,bg=#181825,nobold,nounderscore,noitalics]#[fg=#93a1a1,bg=#586e75]#[fg=#fab387,bg=#f38ba8,nobold,nounderscore,noitalics]#[fg=#f9e2af,bg=#fab387,nobold,nounderscore,noitalics]#[fg=#93a1a1,bg=#586e75]#[fg=#a6e3a1,bg=#f9e2af,nobold,nounderscore,noitalics]#[fg=#89dceb,bg=#a6e3a1,nobold,nounderscore,noitalics]#[fg=#93a1a1,bg=#586e75]#[fg=#89b4fa,bg=#89dceb,nobold,nounderscore,noitalics]#[fg=#93a1a1,bg=#657b83]#[fg=#181825,bg=#89b4fa,nobold,nounderscore,noitalics]#[fg=#6c7086,bg=#181825,bold] #h "

setw -g window-status-activity-style "underscore,fg=#7f849c,bg=#181825"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#7f849c,bg=#181825"
setw -g window-status-format '#[fg=#181825,bg=#181825]#[default] #I  #{b:pane_current_path} #[fg=#181825,bg=#181825,nobold,nounderscore,noitalics]'
setw -g window-status-current-format '#[fg=#181825,bg=#bac2de]#[fg=#6c7086,bg=#bac2de] #I #[fg=#cdd6f4,bg=#6c7086] #{b:pane_current_path} #[fg=#7f849c,bg=#181825,nobold]'
